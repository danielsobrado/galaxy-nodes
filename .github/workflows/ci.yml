name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compatibility:
    name: Node ${{ matrix.node }} / React ${{ matrix.react }} / three ${{ matrix.three }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        react: ['18.2.0', '19.2.6']
        three: ['0.160.0', 'latest']

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Exercise peer dependency range
        run: npm install --no-save --no-package-lock react@${{ matrix.react }} react-dom@${{ matrix.react }} three@${{ matrix.three }}

      - name: Install Chromium for browser-mode WebGL tests
        run: npx playwright install --with-deps chromium

      - name: Lint, coverage test, build, and API check
        run: npm run ci:compat

  hygiene:
    name: Dependency hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependency tree
        run: npm audit --audit-level=moderate

  extended:
    name: Examples, docs, size, and benchmark
    runs-on: ubuntu-latest
    needs: compatibility

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for browser-mode WebGL tests
        run: npx playwright install --with-deps chromium

      - name: Run full library verification
        run: npm run ci
