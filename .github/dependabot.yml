version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      test-and-build-tooling:
        patterns:
          - '@vitest/*'
          - vitest
          - vite
          - playwright
          - typescript
      react:
        patterns:
          - react
          - react-dom
          - '@types/react'
          - '@types/react-dom'
      three:
        patterns:
          - three
          - '@types/three'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
