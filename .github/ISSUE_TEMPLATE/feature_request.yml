name: Feature request
description: Suggest an improvement or new capability.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or integration problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or documentation change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternate designs have you considered?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, sample datasets, or related issues.
